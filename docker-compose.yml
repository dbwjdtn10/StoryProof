# StoryProof 전체 스택
# 사용법:
#   cp .env.example .env  →  API 키 입력  →  docker compose up -d --build
#   프론트엔드: http://localhost:3000  /  API 문서: http://localhost:8000/docs

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-storyproof}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-storyproof}
      POSTGRES_DB: ${POSTGRES_DB:-storyproof}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-storyproof}"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: .
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-storyproof}:${POSTGRES_PASSWORD:-storyproof}@db:5432/${POSTGRES_DB:-storyproof}
      REDIS_HOST: redis
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      # 부하테스트 실측 근거 (docs/SLA.md): 기본 풀(5+10)은 동시성 50에서 고갈
      DB_POOL_SIZE: 30
      DB_MAX_OVERFLOW: 20
    ports:
      - "8000:8000"
    volumes:
      - model_cache:/app/data/hf_cache
      - static_images:/app/backend/static/images
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build: .
    command: celery -A backend.worker.celery_app worker --loglevel=info --concurrency=2
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-storyproof}:${POSTGRES_PASSWORD:-storyproof}@db:5432/${POSTGRES_DB:-storyproof}
      REDIS_HOST: redis
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    volumes:
      - model_cache:/app/data/hf_cache
      - static_images:/app/backend/static/images
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  beat:
    build: .
    command: celery -A backend.worker.celery_app beat --loglevel=info
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-storyproof}:${POSTGRES_PASSWORD:-storyproof}@db:5432/${POSTGRES_DB:-storyproof}
      REDIS_HOST: redis
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - api

volumes:
  pgdata:
  model_cache:
  static_images:
